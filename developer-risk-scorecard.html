<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Risk Scorecard | Flipmo - Gulf Real Estate Developer Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0F1419;
            color: #fff;
            min-height: 100vh;
        }
        
        .hero {
            background: linear-gradient(135deg, #1F4E5F 0%, #2A9D8F 100%);
            padding: 100px 20px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            z-index: 10;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            transform: translateX(-5px);
            color: #FFB830;
        }
        
        h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #fff 0%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 24px;
            opacity: 0.95;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .container {
            max-width: 1200px;
            margin: -60px auto 80px;
            padding: 0 20px;
        }
        
        .search-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .search-box {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .search-input {
            flex: 1;
            padding: 20px;
            background: rgba(31,78,95,0.3);
            border: 2px solid rgba(42,157,143,0.3);
            border-radius: 16px;
            color: white;
            font-size: 18px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(31,78,95,0.5);
        }
        
        .search-btn {
            padding: 20px 40px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(16, 185, 129, 0.4);
        }
        
        .filter-chips {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .chip {
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .chip:hover, .chip.active {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        
        .developers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 28px;
            margin-top: 40px;
        }
        
        .developer-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .developer-card:hover {
            transform: translateY(-4px);
            border-color: #10b981;
            box-shadow: 0 16px 48px rgba(16, 185, 129, 0.2);
        }
        
        .dev-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }
        
        .dev-name {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .dev-location {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        
        .risk-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .risk-low {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 2px solid #10b981;
        }
        
        .risk-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 2px solid #f59e0b;
        }
        
        .risk-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 2px solid #ef4444;
        }
        
        .dev-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 24px 0;
        }
        
        .stat {
            text-align: center;
            padding: 16px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        
        .dev-highlights {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        
        .dev-highlights li {
            padding: 10px 0;
            padding-left: 28px;
            position: relative;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        
        .dev-highlights li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: 700;
            font-size: 16px;
        }
        
        .dev-warnings {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        
        .dev-warnings li {
            padding: 10px 0;
            padding-left: 28px;
            position: relative;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        
        .dev-warnings li::before {
            content: "⚠";
            position: absolute;
            left: 0;
            color: #f59e0b;
            font-weight: 700;
            font-size: 16px;
        }
        
        .view-details-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }
        
        .view-details-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 40px; }
            .developers-grid { grid-template-columns: 1fr; }
            .search-box { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <a href="index.html" class="back-link">← All Tools</a>
        <h1>📊 Developer Risk Scorecard</h1>
        <p>Verify Gulf developers before investing. Track record, delivery history, and risk assessment.</p>
    </div>

    <div class="container">
        <div class="search-card">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search developers (Emaar, Damac, Nakheel, etc.)" onkeyup="filterDevelopers()">
                <button class="search-btn" onclick="filterDevelopers()">🔍 Search</button>
            </div>
            
            <div class="filter-chips">
                <div class="chip active" data-filter="all" onclick="filterByRisk('all')">All Developers</div>
                <div class="chip" data-filter="low" onclick="filterByRisk('low')">🟢 Low Risk</div>
                <div class="chip" data-filter="medium" onclick="filterByRisk('medium')">🟡 Medium Risk</div>
                <div class="chip" data-filter="high" onclick="filterByRisk('high')">🔴 High Risk</div>
            </div>
        </div>

        <div id="developersGrid" class="developers-grid">
            <!-- Developers will be inserted here -->
        </div>
    </div>

    <script>
        const developers = [
            {
                name: "Emaar Properties",
                location: "Dubai, UAE",
                risk: "low",
                score: 92,
                projectsCompleted: 85,
                onTimeDelivery: 94,
                avgDelay: "2 months",
                highlights: [
                    "Burj Khalifa & Dubai Mall developer",
                    "30+ years track record",
                    "Publicly traded (transparency)",
                    "Consistent quality standards"
                ],
                warnings: []
            },
            {
                name: "Nakheel",
                location: "Dubai, UAE",
                risk: "low",
                score: 88,
                projectsCompleted: 52,
                onTimeDelivery: 89,
                avgDelay: "3 months",
                highlights: [
                    "Palm Jumeirah developer",
                    "Government-backed entity",
                    "Strong financial position",
                    "Quality construction"
                ],
                warnings: [
                    "Some delays during 2008 crisis"
                ]
            },
            {
                name: "Damac Properties",
                location: "Dubai, UAE",
                risk: "medium",
                score: 78,
                projectsCompleted: 68,
                onTimeDelivery: 82,
                avgDelay: "4 months",
                highlights: [
                    "Large portfolio of projects",
                    "Luxury segment focus",
                    "Established brand"
                ],
                warnings: [
                    "Variable delivery timelines",
                    "Quality inconsistencies reported",
                    "Customer service complaints"
                ]
            },
            {
                name: "Aldar Properties",
                location: "Abu Dhabi, UAE",
                risk: "low",
                score: 90,
                projectsCompleted: 45,
                onTimeDelivery: 91,
                avgDelay: "2 months",
                highlights: [
                    "Abu Dhabi's leading developer",
                    "Strong government backing",
                    "Excellent track record",
                    "Ferrari World developer"
                ],
                warnings: []
            },
            {
                name: "Dar Al Arkan",
                location: "Riyadh, Saudi Arabia",
                risk: "medium",
                score: 75,
                projectsCompleted: 38,
                onTimeDelivery: 79,
                avgDelay: "5 months",
                highlights: [
                    "Saudi Arabia's largest developer",
                    "Vision 2030 participant",
                    "Diverse portfolio"
                ],
                warnings: [
                    "Delivery delays common",
                    "Financial restructuring in past"
                ]
            },
            {
                name: "Barwa Real Estate",
                location: "Doha, Qatar",
                risk: "low",
                score: 86,
                projectsCompleted: 32,
                onTimeDelivery: 88,
                avgDelay: "3 months",
                highlights: [
                    "Qatar's leading developer",
                    "Government-backed",
                    "World Cup infrastructure",
                    "Strong delivery record"
                ],
                warnings: []
            },
            {
                name: "Select Group",
                location: "Dubai, UAE",
                risk: "medium",
                score: 72,
                projectsCompleted: 28,
                onTimeDelivery: 76,
                avgDelay: "6 months",
                highlights: [
                    "Mid-market specialist",
                    "Growing portfolio",
                    "Competitive pricing"
                ],
                warnings: [
                    "Newer developer (less history)",
                    "Delivery delays reported",
                    "Quality control issues"
                ]
            },
            {
                name: "Azizi Developments",
                location: "Dubai, UAE",
                risk: "high",
                score: 65,
                projectsCompleted: 22,
                onTimeDelivery: 68,
                avgDelay: "8 months",
                highlights: [
                    "Affordable housing focus",
                    "Large project pipeline"
                ],
                warnings: [
                    "Frequent delivery delays",
                    "Quality concerns reported",
                    "Customer complaints",
                    "Finishing issues common"
                ]
            },
            {
                name: "Sobha Realty",
                location: "Dubai, UAE",
                risk: "low",
                score: 89,
                projectsCompleted: 18,
                onTimeDelivery: 92,
                avgDelay: "1 month",
                highlights: [
                    "Premium quality focus",
                    "In-house construction",
                    "Excellent finishing",
                    "Strong track record"
                ],
                warnings: []
            },
            {
                name: "Majid Al Futtaim Properties",
                location: "Dubai, UAE",
                risk: "low",
                score: 91,
                projectsCompleted: 25,
                onTimeDelivery: 93,
                avgDelay: "2 months",
                highlights: [
                    "Mall of the Emirates developer",
                    "Diversified portfolio",
                    "Strong financial backing",
                    "Quality reputation"
                ],
                warnings: []
            },
            {
                name: "Reportage Properties",
                location: "Abu Dhabi, UAE",
                risk: "medium",
                score: 74,
                projectsCompleted: 20,
                onTimeDelivery: 77,
                avgDelay: "5 months",
                highlights: [
                    "Affordable segment",
                    "Growing presence",
                    "Competitive pricing"
                ],
                warnings: [
                    "Variable delivery times",
                    "Quality inconsistencies"
                ]
            },
            {
                name: "Meraas",
                location: "Dubai, UAE",
                risk: "low",
                score: 87,
                projectsCompleted: 15,
                onTimeDelivery: 89,
                avgDelay: "3 months",
                highlights: [
                    "Government-owned",
                    "City Walk, Bluewaters developer",
                    "Innovative projects",
                    "Strong backing"
                ],
                warnings: []
            }
        ];

        let currentFilter = 'all';
        let searchTerm = '';

        function renderDevelopers() {
            const grid = document.getElementById('developersGrid');
            
            const filtered = developers.filter(dev => {
                const matchesFilter = currentFilter === 'all' || dev.risk === currentFilter;
                const matchesSearch = dev.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    dev.location.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 60px; color: rgba(255,255,255,0.5);">No developers found matching your criteria.</p>';
                return;
            }

            grid.innerHTML = filtered.map(dev => `
                <div class="developer-card">
                    <div class="dev-header">
                        <div>
                            <div class="dev-name">${dev.name}</div>
                            <div class="dev-location">${dev.location}</div>
                        </div>
                        <div class="risk-badge risk-${dev.risk}">
                            ${dev.risk === 'low' ? '🟢 Low' : dev.risk === 'medium' ? '🟡 Medium' : '🔴 High'} Risk
                        </div>
                    </div>

                    <div class="dev-stats">
                        <div class="stat">
                            <div class="stat-value">${dev.score}</div>
                            <div class="stat-label">Trust Score</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${dev.onTimeDelivery}%</div>
                            <div class="stat-label">On-Time</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${dev.projectsCompleted}</div>
                            <div class="stat-label">Projects</div>
                        </div>
                    </div>

                    ${dev.highlights.length > 0 ? `
                        <ul class="dev-highlights">
                            ${dev.highlights.slice(0, 3).map(h => `<li>${h}</li>`).join('')}
                        </ul>
                    ` : ''}

                    ${dev.warnings.length > 0 ? `
                        <ul class="dev-warnings">
                            ${dev.warnings.slice(0, 2).map(w => `<li>${w}</li>`).join('')}
                        </ul>
                    ` : ''}

                    <button class="view-details-btn" onclick="viewDetails('${dev.name}')">
                        View Full Report →
                    </button>
                </div>
            `).join('');
        }

        function filterByRisk(risk) {
            currentFilter = risk;
            document.querySelectorAll('.chip').forEach(chip => {
                chip.classList.toggle('active', chip.dataset.filter === risk);
            });
            renderDevelopers();
        }

        function filterDevelopers() {
            searchTerm = document.getElementById('searchInput').value;
            renderDevelopers();
        }

        function viewDetails(devName) {
            alert(`📊 Full developer report for ${devName} coming soon!\n\nThis will include:\n• Complete project history\n• Detailed delivery timeline\n• Customer reviews\n• Financial stability analysis\n• Recommended projects`);
        }

        // Initial render
        renderDevelopers();
    </script>
</body>
</html>
